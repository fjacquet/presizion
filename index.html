<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Presizion — Cluster Refresh Sizing</title>
    <link rel="manifest" href="/presizion/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Presizion" />
    <link rel="apple-touch-icon" sizes="180x180" href="/presizion/icons/apple-touch-icon-180x180.png" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <script>
      try {
        var s = localStorage.getItem('presizion-theme')
        if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--color-background,#fff)">
        <div style="text-align:center;color:#888;font-family:system-ui,sans-serif">
          <div style="font-size:2rem;margin-bottom:.5rem">⚡</div>
          <div style="font-size:.9rem">Loading Presizion…</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
