  <!-- Vertical stem -->
  <rect x="4" y="6" width="6" height="28" fill="#3B82F6" rx="2"/>
  <!-- Top horizontal bar -->
  <rect x="4" y="6" width="20" height="6" fill="#3B82F6" rx="2"/>
  <!-- Right side vertical bar of bowl -->
  <rect x="18" y="6" width="6" height="14" fill="#3B82F6" rx="2"/>
  <!-- Middle horizontal bar (closes the bowl) -->
