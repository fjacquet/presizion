<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Blue background rounded square -->
  <rect width="32" height="32" rx="6" fill="#3B82F6"/>
  <!-- White geometric P mark -->
  <!-- Vertical stem -->
  <rect x="8" y="6" width="4" height="20" fill="white" rx="1"/>
  <!-- Top horizontal bar -->
  <rect x="8" y="6" width="14" height="4" fill="white" rx="1"/>
  <!-- Right vertical bar of bowl -->
